<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Leadership Studies{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex: 1;
        }
        footer {
            background-color: #f8f9fa;
            padding: 1.5rem 0;
            margin-top: auto;
        }
        .navbar-brand {
            font-weight: 600;
        }
        .nav-link {
            color: #d8b4fe !important;
        }
        .nav-link:hover {
            color: #ffffff !important;
        }
        .bg-dark, .navbar.navbar-dark.bg-dark {
            background-color: #3b0764 !important;
        }
        .btn-dark {
            background-color: #3b0764 !important;
            border-color: #3b0764 !important;
        }
        .btn-dark:hover {
            background-color: #2d0550 !important;
            border-color: #2d0550 !important;
        }
        .btn-outline-dark {
            color: #3b0764 !important;
            border-color: #3b0764 !important;
        }
        .btn-outline-dark:hover {
            background-color: #3b0764 !important;
            color: #fff !important;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Leadership Studies</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/articles/">Articles</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/quizzes/">Quizzes</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container my-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer>
        <div class="container text-center text-muted">
            <p class="mb-0">&copy; 2026 Leadership Studies Website</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
