{% extends "base.html" %}

{% block title %}{{ article.title }} – Leadership Studies{% endblock %}

{% block content %}
<article>
    <h1>{{ article.title }}</h1>
    <p class="text-muted small">{{ article.published_date|date:"F j, Y" }}</p>
    <hr>
    <div class="mt-3">
        {{ article.body|safe }}
    </div>
</article>
<a href="{% url 'article_list' %}" class="btn btn-outline-dark mt-4">&larr; Back to Articles</a>
{% endblock %}
