{% extends "base.html" %}

{% block content %}
<h1>Articles</h1>

{% if articles %}
    <ul>
        {% for article in articles %}
            <li>
                <a href="{% url 'article_detail' article.slug %}">{{ article.title }}</a>
            </li>
        {% endfor %}
    </ul>
{% else %}
    <p>No articles published yet.</p>
{% endif %}
{% endblock %}
